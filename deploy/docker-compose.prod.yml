version: "3.8"

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: digital-deputat-backend
    restart: unless-stopped
    networks:
      - shared_network
    ports:
      - "127.0.0.1:8011:8000"
    environment:
      - DJANGO_SETTINGS_MODULE=amanat.settings.production
      - DATABASE_URL=postgresql://digital_deputat_user:StrongPassword2026DigitalDeputat!@shared-postgres:5432/digital_deputat_db
      - SECRET_KEY=super_secure_secret_key_digital_deputat_2026
      - DEBUG=False
      - ALLOWED_HOSTS=digital-deputat.birqadam.kz,localhost,127.0.0.1,digital-deputat-backend
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=https://digital-deputat.birqadam.kz/api
    container_name: digital-deputat-frontend
    restart: unless-stopped
    networks:
      - shared_network
    ports:
      - "127.0.0.1:3011:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_API_URL=https://digital-deputat.birqadam.kz/api
      - INTERNAL_API_URL=http://digital-deputat-backend:8000
    depends_on:
      - backend

  telegram_bot:
    build:
      context: ../telegram_bot
      dockerfile: Dockerfile
    container_name: digital-deputat-telegram-bot
    restart: unless-stopped
    networks:
      - shared_network
    environment:
      - ENV=production
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - API_BASE_URL=http://digital-deputat-backend:8000/api
    depends_on:
      - backend

networks:
  shared_network:
    external: true
