services:
  db:
    image: postgres:16-alpine
    container_name: amanat-dev-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-amanat_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-amanat_dev}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: amanat-dev-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_dev_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    container_name: amanat-dev-backend
    restart: unless-stopped
    working_dir: /app
    command: >
      sh -c "python manage.py migrate &&
             python manage.py create_not_identified_deputy &&
             python manage.py create_test_users &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      DJANGO_SETTINGS_MODULE: amanat.settings.development
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
      DEBUG: "True"
      ALLOWED_HOSTS: localhost,127.0.0.1,backend
      DEV_DB_NAME: ${POSTGRES_DB:-amanat_dev}
      DEV_DB_USER: ${POSTGRES_USER:-postgres}
      DEV_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DEV_DB_HOST: db
      DEV_DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-amanat_dev}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_HOST: db
      DB_PORT: 5432
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      APPEAL_MESSAGE_LIMIT: ${APPEAL_MESSAGE_LIMIT:-10}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    container_name: amanat-dev-worker
    restart: unless-stopped
    working_dir: /app
    command: celery -A amanat worker -l info
    environment:
      DJANGO_SETTINGS_MODULE: amanat.settings.development
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-me}
      DEBUG: "True"
      DEV_DB_NAME: ${POSTGRES_DB:-amanat_dev}
      DEV_DB_USER: ${POSTGRES_USER:-postgres}
      DEV_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DEV_DB_HOST: db
      DEV_DB_PORT: 5432
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
    volumes:
      - ../backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
    container_name: amanat-dev-frontend
    restart: unless-stopped
    working_dir: /app
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000/ws/notifications/}
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    command: sh -c "npm ci && npm run dev -- --hostname 0.0.0.0 --port 3000"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ../frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      backend:
        condition: service_started

  telegram_bot:
    build:
      context: ../telegram_bot
      dockerfile: Dockerfile.dev
    container_name: amanat-dev-telegram-bot
    restart: unless-stopped
    working_dir: /app
    profiles: ["bot"]
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      API_BASE_URL: ${API_BASE_URL:-http://backend:8000/api}
    command: python bot.py
    volumes:
      - ../telegram_bot:/app
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_dev_data:
  redis_dev_data:
  frontend_node_modules:
  frontend_next:
