<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Amanat — мост между гражданами и властью</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #F8FAFC;
        }
        
        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            flex-direction: column;
            position: relative;
            background-color: #FFFFFF;
        }

        .header-bg {
            background-color: #005A9C; /* KZ Blue */
            height: 80px;
            position: relative;
            display: flex;
            align-items: center;
            padding: 0 60px;
        }

        .header-accent {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background-color: #00B1B0; /* Technology Green */
        }

        .title-font {
            font-family: 'Montserrat', sans-serif;
        }

        /* Hero Section */
        .hero-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            position: relative;
            padding: 0 40px;
        }

        .main-title {
            font-family: 'Montserrat', sans-serif;
            font-size: 56px;
            font-weight: 800;
            color: #1E293B;
            line-height: 1.2;
            margin-bottom: 24px;
            max-width: 900px;
        }
        
        .title-highlight {
            color: #005A9C;
            position: relative;
        }
        
        .title-highlight::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 0;
            width: 100%;
            height: 8px;
            background-color: #00B1B0;
            opacity: 0.2;
            z-index: -1;
        }

        .subtitle {
            font-size: 24px;
            color: #64748B;
            font-weight: 500;
            margin-bottom: 40px;
            max-width: 800px;
        }

        .bridge-graphic {
            width: 100%;
            height: 120px;
            position: relative;
            margin: 20px 0 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bridge-arch {
            width: 600px;
            height: 100px;
            border-top: 4px dashed #CBD5E1;
            border-radius: 50% 50% 0 0;
            position: absolute;
            top: 20px;
        }

        .connection-point {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: absolute;
            top: 0;
            background-color: white;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .point-citizens {
            left: 280px;
            border: 2px solid #3B82F6;
            color: #3B82F6;
        }
        
        .point-gov {
            right: 280px;
            border: 2px solid #005A9C;
            color: #005A9C;
        }

        .point-center {
            width: 80px;
            height: 80px;
            background-color: #00B1B0;
            color: white;
            font-size: 32px;
            top: -40px; /* Adjusted to be at the peak */
            z-index: 20;
            box-shadow: 0 10px 15px -3px rgba(0, 177, 176, 0.3);
        }

        .thank-you {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 700;
            color: #00B1B0;
            margin-bottom: 40px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .contact-grid {
            display: flex;
            gap: 60px;
            margin-top: 20px;
        }

        .contact-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .contact-icon-circle {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background-color: #F0F9FF;
            color: #005A9C;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 8px;
            transition: all 0.3s ease;
        }
        
        .contact-card:hover .contact-icon-circle {
            background-color: #005A9C;
            color: white;
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0, 90, 156, 0.3);
        }

        .contact-label {
            font-size: 14px;
            color: #94A3B8;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .contact-value {
            font-size: 18px;
            color: #1E293B;
            font-weight: 600;
        }

        .bg-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(#E2E8F0 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.5;
            z-index: -1;
        }

        .logo-small {
            position: absolute;
            top: 30px;
            left: 60px;
            font-weight: 800;
            font-size: 24px;
            color: #005A9C;
            display: flex;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>
<div class="slide-container">
<!-- Background Pattern -->
<div class="bg-pattern"></div>
<!-- Logo -->
<div class="logo-small">
<div class="w-8 h-8 bg-green-500 rounded-lg flex items-center justify-center text-white text-xs">
<i class="fas fa-check"></i>
</div>
<span>AMANAT</span>
</div>
<!-- Slide Number -->
<div class="absolute right-10 top-8 text-gray-400 font-mono text-lg">16</div>
<!-- Main Content -->
<div class="hero-section">
<h1 class="main-title">
<span class="title-highlight">AMANAT</span> — МОСТ МЕЖДУ<br/>ГРАЖДАНАМИ И ВЛАСТЬЮ
            </h1>
<p class="subtitle">
                Присоединяйтесь к цифровой трансформации Казахстана.<br/>
                Повышайте прозрачность, доверие и эффективность работы маслихатов.
            </p>
<!-- Visualization -->
<div class="bridge-graphic">
<div class="bridge-arch"></div>
<div class="connection-point point-citizens">
<i class="fas fa-users"></i>
</div>
<div class="connection-point point-center">
<i class="fas fa-link"></i>
</div>
<div class="connection-point point-gov">
<i class="fas fa-landmark"></i>
</div>
</div>
<h2 class="thank-you">СПАСИБО ЗА ВНИМАНИЕ!</h2>
<div class="contact-grid">
<div class="contact-card">
<div class="contact-icon-circle">
<i class="fas fa-envelope"></i>
</div>
<span class="contact-label">Email</span>
<span class="contact-value">contact@amanat-platform.kz</span>
</div>
<div class="contact-card">
<div class="contact-icon-circle">
<i class="fas fa-phone-alt"></i>
</div>
<span class="contact-label">Телефон</span>
<span class="contact-value">+7 (777) 123-45-67</span>
</div>
<div class="contact-card">
<div class="contact-icon-circle">
<i class="fas fa-globe"></i>
</div>
<span class="contact-label">Сайт</span>
<span class="contact-value">www.amanat-platform.kz</span>
</div>
</div>
</div>
<!-- Footer Strip -->
<div class="h-4 w-full bg-blue-700 mt-auto relative">
<div class="absolute top-0 left-0 h-full w-1/3 bg-blue-500"></div>
<div class="absolute top-0 right-0 h-full w-1/3 bg-teal-500"></div>
</div>
</div>
</body>
</html>
