<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Amanat Citizen Platform</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&amp;family=Inter:wght@300;400;500&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #F8FAFC;
        }
        
        .hero-bg {
            background-color: #005A9C; /* KZ Blue */
            position: relative;
            overflow: hidden;
        }
        
        .hero-pattern {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23004a85' fill-opacity='0.2'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
        }
        
        .accent-green {
            color: #00B1B0; /* Technology Green */
        }
        
        .text-kz-blue {
            color: #005A9C;
        }

        .decorative-circle {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            background-color: #FFFFFF;
        }
        
        .slide-container {
            width: 1280px;
            height: 720px;
            display: flex;
            position: relative;
        }

        .title-font {
            font-family: 'Montserrat', sans-serif;
        }
    </style>
</head>
<body>
<div class="slide-container hero-bg">
<div class="hero-pattern"></div>
<!-- Decorative Elements -->
<div class="decorative-circle" style="width: 600px; height: 600px; top: -100px; right: -100px;"></div>
<div class="decorative-circle" style="width: 300px; height: 300px; bottom: 50px; left: -50px;"></div>
<div class="flex-1 flex flex-col justify-center items-center z-10 px-20 text-center">
<!-- Logo/Icon Placeholder -->
<div class="mb-8 p-4 bg-white bg-opacity-10 rounded-2xl backdrop-filter backdrop-blur-sm border border-white border-opacity-20">
<svg fill="none" height="80" viewbox="0 0 24 24" width="80" xmlns="http://www.w3.org/2000/svg">
<path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#00B1B0" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M2 17L12 22L22 17" stroke="#00B1B0" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<path d="M2 12L12 17L22 12" stroke="#00B1B0" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
</svg>
</div>
<h1 class="title-font font-bold text-6xl text-white mb-4 tracking-tight leading-tight">
                AMANAT CITIZEN <br/>
<span class="text-white text-opacity-90">PLATFORM</span>
</h1>
<div class="w-24 h-1.5 bg-white mb-8 mt-2 rounded-full opacity-80"></div>
<p class="font-medium text-2xl text-blue-100 mb-2 max-w-4xl leading-relaxed">
                Цифровая платформа взаимодействия граждан и депутатов маслихатов
            </p>
<div class="mt-12 py-3 px-8 bg-white bg-opacity-10 rounded-full border border-white border-opacity-20 backdrop-filter backdrop-blur-sm">
<p class="text-white font-semibold text-lg tracking-wide uppercase title-font">
                    ДЛЯ РЕГИОНАЛЬНЫХ АКИМАТОВ РЕСПУБЛИКИ КАЗАХСТАН
                </p>
</div>
<div class="absolute bottom-10 text-blue-200 text-sm font-light flex items-center gap-2">
<span class="w-2 h-2 rounded-full bg-green-400"></span> 
                Профессиональное GovTech решение
            </div>
</div>
<!-- Right Side Graphic Accent -->
<div class="absolute right-0 top-0 bottom-0 w-1/3 bg-white bg-opacity-5 skew-x-12 transform origin-bottom-left translate-x-20"></div>
</div>
</body>
</html>
