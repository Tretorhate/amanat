[tool:pytest]
DJANGO_SETTINGS_MODULE = amanat.settings.development
python_files = tests.py test_*.py *_tests.py
addopts = 
    --tb=short
    --strict-markers
    -ra
    --ds=amanat.settings.development
testpaths = 
    apps/accounts/tests
    apps/citizens/tests
    apps/deputies/tests
    apps/appeals/tests
    apps/messages/tests
    apps/analytics/tests
    apps/notifications/tests
    apps/core/tests