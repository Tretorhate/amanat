version: "3.8"

services:
  # ─── Data Layer ───────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    container_name: amanat-postgres
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: amanat-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file: .env
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend (HTTP + WebSocket via Daphne) ─────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: amanat-backend
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: amanat.settings.production
    ports:
      - "127.0.0.1:8011:8000"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/media
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Celery (Worker + Beat scheduler) ─────────────────────────────────────

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
      network: host
    container_name: amanat-celery
    restart: unless-stopped
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: amanat.settings.production
    command: ["celery", "-A", "amanat", "worker", "-B", "-l", "info", "--concurrency=2"]
    volumes:
      - media_files:/app/media
    depends_on:
      backend:
        condition: service_healthy

  # ─── Frontend ──────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      network: host
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: amanat-frontend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      INTERNAL_API_URL: http://backend:8000
    ports:
      - "127.0.0.1:3011:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    depends_on:
      backend:
        condition: service_healthy

  # ─── Telegram Bot ──────────────────────────────────────────────────────────

  telegram-bot:
    build:
      context: ./telegram_bot
      dockerfile: Dockerfile
      network: host
    container_name: amanat-telegram-bot
    restart: unless-stopped
    env_file: .env
    environment:
      ENV: production
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      API_BASE_URL: http://backend:8000/api
    depends_on:
      backend:
        condition: service_healthy

# ─── Volumes ────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:

# ─── Network ────────────────────────────────────────────────────────────────

networks:
  default:
    name: amanat_network
